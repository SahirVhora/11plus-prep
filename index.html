    <script>
      // Restore path from GitHub Pages 404 redirect
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          window.history.replaceState(null, null,
            '/' + decodeURIComponent(p[1]) + window.location.hash
          );
        }
      })();
    </script>
